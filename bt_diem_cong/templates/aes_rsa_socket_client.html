<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>AES-RSA Client Chat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        :root {
            --bg-burgundy: #1a0b16;
            --pink-neon: #ff1493;
            --gold-justice: #ffd700;
        }
        body {
            background: linear-gradient(rgba(26, 11, 22, 0.85), rgba(26, 11, 22, 0.85)), 
                        url('/static/Lobotomy_In_the_Name_of_Love_and_Hate_Don_Quixote_Full_Uptied.png') center/cover no-repeat fixed;
            color: #f3f0df; min-height: 100vh; display: flex; align-items: center;
        }
        .chat-wrapper {
            background: rgba(45, 9, 27, 0.9);
            border: 2px solid var(--pink-neon);
            border-radius: 16px; box-shadow: 0 0 20px rgba(255, 20, 147, 0.5);
            overflow: hidden;
        }
        .panel-header {
            background: linear-gradient(90deg, #2d091b, var(--pink-neon));
            border-bottom: 2px solid var(--gold-justice); padding: 15px;
        }
        #chat-box {
            height: 380px; overflow-y: auto; background: rgba(15, 3, 10, 0.9);
            border-radius: 8px; border: 1px solid #4a1231; padding: 15px;
        }
        .msg-container { margin-bottom: 12px; }
        .msg-bubble {
            padding: 10px 14px; border-radius: 12px; display: inline-block;
            max-width: 75%; word-wrap: break-word;
        }
        .msg-me { background: var(--pink-neon); color: white; }
        /* Đổi màu chữ msg-other sang màu vàng nhạt có độ tương phản cao để dễ nhìn */
        .msg-other { background: #3d142b; color: #fff3cd; border: 1px solid #6b1d4b; }
        .system-notif { text-align: center; color: #ffb6c1; font-size: 0.85rem; font-style: italic; margin: 8px 0; }
    </style>
</head>
<body>

    <div class="container" style="max-width: 650px;">
        <div class="card chat-wrapper">
            <div class="panel-header d-flex justify-content-between align-items-center">
                <h5 class="m-0 text-white fw-bold">💖 CLIENT CHAT 💖</h5>
                <button onclick="exitChat()" class="btn btn-danger btn-sm fw-bold border-light">Thoát</button>
            </div>
            
            <div id="setup-area" class="card-body p-4 text-center">
                <p class="text-warning font-monospace">"Nhập tên Client"</p>
                <div class="input-group shadow-sm mt-3">
                    <input type="text" id="username-input" class="form-control bg-dark text-white border-secondary" placeholder="Nhập tên định danh... VD: Client 1">
                    <button onclick="connectToChat()" class="btn btn-warning fw-bold text-dark">Vào phòng chat</button>
                </div>
            </div>

            <div id="chat-area" class="card-body p-4 d-none">
                <div id="chat-box" class="mb-3"></div>
                <div class="input-group">
                    <input type="text" id="msg-input" class="form-control bg-dark text-white border-secondary" placeholder="Nhập tin nhắn để mã hóa mật...">
                    <button onclick="sendMessage()" class="btn btn-success fw-bold">Gửi</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let socket;
        let myUsername = "";

        function connectToChat() {
            const usernameInput = document.getElementById('username-input');
            myUsername = usernameInput.value.trim();
            if(!myUsername) return alert("Vui lòng nhập tên Client!");

            socket = io();

            socket.on('connect', () => {
                socket.emit('client_join', { username: myUsername });
                document.getElementById('setup-area').classList.add('d-none');
                document.getElementById('chat-area').classList.remove('d-none');
            });

            socket.on('chat_notification', (data) => {
                const box = document.getElementById('chat-box');
                box.innerHTML += `<div class="system-notif">🌟 ${data.message} 🌟</div>`;
                box.scrollTop = box.scrollHeight;
            });

            socket.on('receive_msg', (data) => {
                const box = document.getElementById('chat-box');
                const isMe = data.username === myUsername;
                box.innerHTML += `
                    <div class="msg-container text-${isMe ? 'end' : 'start'}">
                        <small class="d-block text-white fw-bold mb-1">${data.username}</small>
                        <div class="msg-bubble ${isMe ? 'msg-me' : 'msg-other'} shadow-sm">${data.message}</div>
                    </div>`;
                box.scrollTop = box.scrollHeight;
            });
        }

        function sendMessage() {
            const input = document.getElementById('msg-input');
            const msg = input.value.trim();
            if(!msg) return;

            if(msg === 'exit') {
                exitChat();
                return;
            }

            socket.emit('send_msg', { message: msg });
            input.value = '';
        }

        function exitChat() {
            if(socket) socket.disconnect();
            window.location.href = "/";
        }

        document.getElementById('msg-input')?.addEventListener('keypress', function(e) {
            if(e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
